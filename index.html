<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WholCure LMS | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <div class="flex">
        <aside class="w-64 h-screen bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-4 fixed z-20">
            <div class="px-4 mb-8 text-2xl font-black text-amber-500 tracking-tighter">WholCure<span class="text-slate-900 dark:text-white">LMS</span></div>
            
            <nav class="space-y-1.5">
                <button data-target="overview" class="nav-tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-amber-500/10 text-amber-600 dark:text-amber-400 font-semibold transition">
                    📊 Dashboard
                </button>
                <button data-target="courses" class="nav-tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    📚 Courses
                </button>
                <button data-target="categories" class="nav-tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    📂 Categories
                </button>
                <button data-target="auth" class="nav-tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    👥 Users
                </button>
            </nav>
        </aside>

        <main class="ml-64 flex-1">
            <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 sticky top-0 z-10">
                <h2 class="font-bold text-lg text-slate-800 dark:text-slate-200">System Control Center</h2>
                <button onclick="document.documentElement.classList.toggle('dark')" class="text-sm px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg hover:bg-slate-200">
                    🌓 Toggle Theme
                </button>
            </header>

            <div id="app" class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <p class="text-slate-500 text-sm">Total Courses</p>
                        <h3 class="text-3xl font-extrabold mt-2 text-amber-500">24</h3>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <p class="text-slate-500 text-sm">Total Students</p>
                        <h3 class="text-3xl font-extrabold mt-2 text-blue-500">1,284</h3>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <p class="text-slate-500 text-sm">Revenue</p>
                        <h3 class="text-3xl font-extrabold mt-2 text-emerald-500">$45.2k</h3>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <p class="text-slate-500 text-sm">Support Tickets</p>
                        <h3 class="text-3xl font-extrabold mt-2 text-rose-500">12</h3>
                    </div>
                </div>

                <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-8 text-center">
                    <h2 class="text-xl font-bold mb-2">Welcome to Control Center</h2>
                    <p class="text-slate-500">Select a category from the sidebar to manage your platform resources.</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
